<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juggling Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --md-primary: #1a6c3a;
  --md-on-primary: #ffffff;
  --md-primary-container: #a8f5be;
  --md-on-primary-container: #002110;
  --md-secondary-container: #d0e8d7;
  --md-on-secondary-container: #0b1f12;
  --md-error-container: #ffdad6;
  --md-on-error-container: #410002;
  --md-background: #f6fbf4;
  --md-on-background: #181d18;
  --md-surface: #f6fbf4;
  --md-on-surface: #181d18;
  --md-surface-variant: #dce5db;
  --md-on-surface-variant: #404942;
  --md-outline: #707972;
  --md-outline-variant: #c0c9c0;
  --md-surface-1: color-mix(in srgb, var(--md-primary) 5%, var(--md-surface));
  --md-surface-2: color-mix(in srgb, var(--md-primary) 8%, var(--md-surface));
  --md-elev-1: 0 1px 2px rgba(0,0,0,.10), 0 1px 3px 1px rgba(0,0,0,.07);
  --md-elev-2: 0 1px 2px rgba(0,0,0,.10), 0 2px 6px 2px rgba(0,0,0,.07);
  --md-elev-3: 0 4px 8px 3px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.10);
  --md-shape-sm: 8px;
  --md-shape-xl: 28px;
  --md-shape-full: 9999px;
  --font-brand: 'Google Sans Display', 'Google Sans', sans-serif;
  --font-ui: 'Google Sans', 'Noto Sans', sans-serif;
  --motion-dec: cubic-bezier(0, 0, 0, 1);
  --motion-spr: cubic-bezier(0.34, 1.56, 0.64, 1);
  --motion-std: cubic-bezier(0.2, 0, 0, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  background: var(--md-background);
  color: var(--md-on-background);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Top App Bar ── */
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: var(--md-surface-2);
  border-bottom: 1px solid var(--md-outline-variant);
  height: 64px;
  transition: box-shadow .3s var(--motion-std);
}
.top-bar.elevated { box-shadow: var(--md-elev-2); }
.top-bar-inner {
  max-width: 860px; margin: 0 auto;
  padding: 0 8px 0 16px;
  height: 64px;
  display: flex; align-items: center; gap: 12px;
}
.top-bar-icon { font-size: 26px; }
.top-bar-title { font-family: var(--font-brand); font-size: 22px; font-weight: 400; color: var(--md-on-surface); }
.top-bar-actions { margin-left: auto; display: flex; gap: 2px; }
.icon-btn {
  width: 48px; height: 48px; border-radius: var(--md-shape-full);
  border: none; background: transparent; color: var(--md-on-surface-variant);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.icon-btn:hover { background: color-mix(in srgb, var(--md-on-surface) 8%, transparent); }
.icon-btn:active { background: color-mix(in srgb, var(--md-on-surface) 12%, transparent); }
.icon-btn .material-icons-round { font-size: 24px; }

/* ── App Screen ── */
#app-screen { display: block; }
.app-content { max-width: 860px; margin: 0 auto; padding: 20px 16px 80px; }

.loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px; gap: 20px; color: var(--md-on-surface-variant); font-size: 14px;
}
.m3-spinner {
  width: 48px; height: 48px; border: 4px solid var(--md-outline-variant);
  border-top-color: var(--md-primary); border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Cards ── */
.cards-grid { display: flex; flex-direction: column; gap: 12px; }

.trick-card {
  border-radius: var(--md-shape-xl);
  padding: 20px;
  box-shadow: var(--md-elev-1);
  transition: box-shadow .25s var(--motion-std), transform .25s var(--motion-std);
  animation: card-in .35s var(--motion-dec) both;
  /* color vars set per-card via inline style */
  background: var(--card-bg);
  border: 1px solid var(--card-border);
}
.trick-card:nth-child(1) { animation-delay: .04s; }
.trick-card:nth-child(2) { animation-delay: .08s; }
.trick-card:nth-child(3) { animation-delay: .12s; }
.trick-card:nth-child(4) { animation-delay: .16s; }
.trick-card:nth-child(5) { animation-delay: .20s; }
.trick-card:hover { box-shadow: var(--md-elev-2); transform: translateY(-1px); }

/* Card accent stripe at top */
.trick-card::before {
  content: '';
  display: block;
  height: 4px;
  border-radius: 9999px;
  background: var(--card-accent);
  margin-bottom: 16px;
  opacity: 0.7;
}

/* Card layout: left content + right progress ring */
.card-body {
  display: flex; align-items: center; gap: 16px;
}
.card-left { flex: 1; min-width: 0; }

.trick-name {
  font-family: var(--font-brand); font-size: 18px; font-weight: 700;
  color: var(--md-on-surface); letter-spacing: -.01em; margin-bottom: 8px;
}
.card-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

.chip {
  height: 28px; padding: 0 10px; border-radius: var(--md-shape-full);
  border: 1px solid var(--md-outline-variant); background: var(--md-surface);
  font-size: 11px; font-weight: 500; color: var(--md-on-surface-variant);
  display: inline-flex; align-items: center; gap: 4px;
}
.chip.status-chip { background: var(--s-bg); color: var(--s-fg); border-color: transparent; }
.chip .material-icons-round { font-size: 13px; }

/* Milestone ring buttons row */
.milestones-row { display: flex; flex-wrap: wrap; gap: 8px; }

.milestone-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.milestone-label { font-size: 10px; font-weight: 500; color: var(--md-on-surface-variant); letter-spacing: .05em; }
.milestone-label.lit { color: var(--card-accent, var(--md-primary)); }

/* Small milestone rings (clickable) */
.ring-btn {
  position: relative; width: 58px; height: 58px;
  border: none; background: none; cursor: pointer; padding: 0; border-radius: 50%;
  transition: transform .2s var(--motion-spr);
}
.ring-btn:hover:not(:disabled) { transform: scale(1.1); }
.ring-btn:active:not(:disabled) { transform: scale(.92); }
.ring-btn:disabled { cursor: not-allowed; transform: none; opacity: .55; }
.ring-btn svg { display: block; transform: rotate(-90deg); }
.r-track { fill: none; stroke: var(--md-surface-variant); stroke-width: 4.5; }
.r-fill { fill: none; stroke: var(--card-accent, var(--md-primary)); stroke-width: 4.5; stroke-linecap: round; transition: stroke-dasharray .45s var(--motion-dec); }
.ring-face {
  position: absolute; inset: 8px; border-radius: 50%;
  background: var(--md-surface); box-shadow: var(--md-elev-1);
  display: flex; align-items: center; justify-content: center; transition: background .2s;
}
.ring-btn.lit .ring-face { background: color-mix(in srgb, var(--card-accent, var(--md-primary)) 15%, white); }
.ring-count {
  font-family: var(--font-brand); font-size: 15px; font-weight: 700;
  color: var(--md-on-surface); line-height: 1; transition: all .15s;
}
.ring-btn.lit .ring-count { color: var(--card-accent, var(--md-on-primary-container)); }
.ring-btn.busy .ring-count { font-size: 10px; color: var(--md-primary); }

/* ── BIG Progress Ring (right side) ── */
.progress-ring-wrap {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: default;
}

.progress-ring-outer {
  position: relative; width: 100px; height: 100px;
}
.progress-ring-outer svg { display: block; transform: rotate(-90deg); }

.pr-track { fill: none; stroke: var(--md-surface-variant); stroke-width: 9; }
.pr-fill  {
  fill: none;
  stroke-width: 9;
  stroke-linecap: round;
  transition: stroke-dasharray .6s var(--motion-dec), stroke .3s;
}

.progress-ring-face {
  position: absolute; inset: 10px; border-radius: 50%;
  background: var(--md-surface);
  box-shadow: var(--md-elev-1);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
}
.pr-pct {
  font-family: var(--font-brand); font-size: 22px; font-weight: 700;
  line-height: 1; color: var(--md-on-surface);
}
.pr-label {
  font-size: 9px; font-weight: 500; letter-spacing: .06em;
  color: var(--md-on-surface-variant); text-transform: uppercase;
}
.progress-ring-days .material-icons-round { font-size: 13px; }

/* ── Pulse ── */
@keyframes ring-pulse {
  0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--md-primary) 45%, transparent); }
  65%  { box-shadow: 0 0 0 14px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.ring-btn.pulsed { animation: ring-pulse .55s ease; }

/* Progress ring color thresholds */
.pr-fill.pct-low    { stroke: #ef6c00; }   /* < 30% — amber */
.pr-fill.pct-mid    { stroke: #1565c0; }   /* 30–70% — blue */
.pr-fill.pct-high   { stroke: #1a6c3a; }   /* > 70% — primary green */
.pr-fill.pct-full   { stroke: #6a0dad; }   /* 100% — purple celebration */

/* ── Snackbar ── */
#snackbar-container {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  z-index: 9999; pointer-events: none;
  width: max-content; max-width: calc(100vw - 32px);
}
.snackbar {
  background: #2e3b31; color: #e2f0e5; border-radius: var(--md-shape-sm);
  padding: 14px 20px; font-size: 14px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--md-elev-3);
  animation: snack-in .3s var(--motion-dec) both; min-width: 240px;
}
.snackbar.err { background: #442323; color: #ffdad6; }
.snackbar .material-icons-round { font-size: 18px; flex-shrink: 0; }
.snackbar.ok .material-icons-round { color: var(--md-primary-container); }
.snackbar.err .material-icons-round { color: #ffb4ab; }
@keyframes snack-in {
  from { opacity: 0; transform: translateY(14px) scale(.96); }
  to   { opacity: 1; transform: none; }
}
@keyframes snack-out {
  from { opacity: 1; }
  to   { opacity: 0; transform: translateY(6px) scale(.97); }
}
.snackbar.bye { animation: snack-out .22s var(--motion-std) forwards; }

.btn-outlined {
  height: 40px; padding: 0 24px; border-radius: var(--md-shape-full);
  border: 1px solid var(--md-outline); background: transparent; color: var(--md-primary);
  font-family: var(--font-ui); font-size: 14px; font-weight: 500;
  cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background .2s;
}
.btn-outlined:hover { background: color-mix(in srgb, var(--md-primary) 8%, transparent); }

.state-screen { text-align: center; padding: 60px 20px; color: var(--md-on-surface-variant); }
.state-screen .material-icons-round { font-size: 48px; margin-bottom: 12px; opacity: .4; display: block; }
.state-screen p { font-size: 15px; margin-bottom: 20px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--md-outline-variant); border-radius: 3px; }
</style>
</head>
<body>

<header class="top-bar" id="top-bar">
  <div class="top-bar-inner">
    <span class="top-bar-icon">🤹</span>
    <span class="top-bar-title">Juggling Tracker</span>
    <div class="top-bar-actions" id="hdr-actions">
      <button class="icon-btn" title="Refresh" onclick="refreshData()">
        <span class="material-icons-round">refresh</span>
      </button>
    </div>
  </div>
</header>

<div id="app-screen">
  <div class="app-content">
    <div id="cards-container"></div>
  </div>
</div>

<div id="snackbar-container"></div>

<script>
const DB_ID      = '76b029ab-fb5f-4cca-89e8-501caeadb26e';
const MILESTONES = ['50','100','150','200','250','300','500','1000'];
const MAX_VAL    = {'50':300,'100':150,'150':100,'200':50,'250':60,'300':50,'500':30,'1000':20};
const STATUS_S   = {
  'Practicing': { bg:'#fff3e0', fg:'#7c4b00' },
  'Okay':       { bg:'#e8f5e9', fg:'#1b5e20' },
  'Good':       { bg:'#e3f2fd', fg:'#0d47a1' },
  'Great':      { bg:'#ede7f6', fg:'#4527a0' },
  'Master':     { bg:'#fce4ec', fg:'#880e4f' },
  'Paused':     { bg:'#f5f5f5', fg:'#616161' },
  'Not started':{ bg:'#f5f5f5', fg:'#616161' },
};
const DIFF_LBL = ['','Beginner','Easy','Medium','Hard','Expert'];

const WORKER_URL = 'https://juggling.nahidarch.workers.dev';
let entries = [];
let busy    = new Set();

window.addEventListener('load', () => {
  window.addEventListener('scroll', () =>
    document.getElementById('top-bar').classList.toggle('elevated', scrollY > 4));
  loadEntries();
});

// Calculate total days since start date
function calcTotalDays(startDateStr) {
  if (!startDateStr) return null;
  const start = new Date(startDateStr);
  const now   = new Date();
  return Math.floor((now - start) / (1000 * 60 * 60 * 24));
}

// Calculate progress as % of milestone targets hit
// Uses ratio of (sum of all counts * milestone) vs (sum of all max values * milestone)
function calcProgress(e) {
  const WEIGHTS = {'50':300,'100':150,'150':100,'200':50,'250':60,'300':50,'500':30,'1000':20};
  let achieved = 0, total = 0;
  for (const [m, maxCount] of Object.entries(WEIGHTS)) {
    const val = e[m] || 0;
    achieved += Math.min(val, maxCount);
    total    += maxCount;
  }
  return total > 0 ? Math.round((achieved / total) * 100) : 0;
}

async function notionReq(path, method = 'GET', body = null) {
  const url  = `${WORKER_URL}${path}`;
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}

async function loadEntries() {
  const c = document.getElementById('cards-container');
  c.innerHTML = `<div class="loading-screen"><div class="m3-spinner"></div><span>Loading your tricks…</span></div>`;
  try {
    const data = await notionReq(`/databases/${DB_ID}/query`, 'POST',
      { sorts: [{ property: 'Difficulty', direction: 'ascending' }] });

    entries = data.results.map(page => {
      const p = page.properties;
      const startDate = p['Start Date']?.date?.start || null;

      const e = {
        id:         page.id,
        title:      p.Title?.title?.[0]?.plain_text || 'Untitled',
        status:     p.Status?.status?.name || '',
        difficulty: p.Difficulty?.number || 0,
        startDate:  startDate,
      };
      for (const m of MILESTONES) e[m] = p[m]?.number || 0;
      e.totalDays = calcTotalDays(startDate);
      e.progress  = calcProgress(e);
      return e;
    });

    renderCards();
    return true;
  } catch (err) {
    c.innerHTML = `<div class="state-screen">
      <span class="material-icons-round">error_outline</span>
      <p>${err.message}</p>
      <button class="btn-outlined" onclick="loadEntries()">
        <span class="material-icons-round">refresh</span> Retry
      </button></div>`;
    return false;
  }
}

function refreshData() { loadEntries(); }

// M3 Tonal card palette — each entry is [bg, border, accent, ring-color]
// All backgrounds are lightly tinted, on-surface friendly
const CARD_PALETTE = [
  { bg: '#f0faf4', border: '#c2e8cf', accent: '#1a6c3a', ring: '#1a6c3a' }, // green
  { bg: '#fef3e2', border: '#f5dfa8', accent: '#b06000', ring: '#b06000' }, // amber
  { bg: '#e8f0fe', border: '#b3c8f5', accent: '#1557b0', ring: '#1557b0' }, // blue
  { bg: '#fce4ec', border: '#f5b8cc', accent: '#b0004e', ring: '#b0004e' }, // rose
  { bg: '#ede7f6', border: '#cdb8f0', accent: '#5e35b1', ring: '#5e35b1' }, // purple
  { bg: '#e0f7fa', border: '#9adce5', accent: '#00696f', ring: '#00696f' }, // teal
  { bg: '#fff8e1', border: '#f5dfaa', accent: '#a05000', ring: '#a05000' }, // gold
  { bg: '#fce8e6', border: '#f5c0ba', accent: '#b3261e', ring: '#b3261e' }, // red
];

function cardPalette(index) {
  return CARD_PALETTE[index % CARD_PALETTE.length];
}

function renderCards() {
  const c = document.getElementById('cards-container');
  if (!entries.length) {
    c.innerHTML = `<div class="state-screen"><span class="material-icons-round">inbox</span><p>No tricks found.</p></div>`;
    return;
  }
  const sorted = [...entries].sort((a, b) => (a.progress || 0) - (b.progress || 0));
  c.innerHTML = `<div class="cards-grid">${sorted.map((e,i) => cardHTML(e,i)).join('')}</div>`;
}

function cardHTML(e, index) {
  const st   = STATUS_S[e.status] || { bg:'#f5f5f5', fg:'#616161' };
  const diff = DIFF_LBL[e.difficulty] || '';

  const pal = cardPalette(index);

  // Progress ring data
  const pct     = e.progress != null ? Math.min(Math.max(e.progress, 0), 100) : 0;
  const pctDisp = Math.round(pct);
  const days    = e.totalDays != null ? e.totalDays : null;

  // Ring arc
  const sz = 100, sw = 9, r = (sz - sw*2) / 2;
  const circ  = 2 * Math.PI * r;
  const pDash = (pct / 100) * circ;

  // Use card's own accent color for the progress ring
  const prColor = pal.ring;

  const milHtml = MILESTONES.map(m => mHTML(e, m)).join('');

  return `
<div class="trick-card" id="card-${sid(e.id)}"
  style="--card-bg:${pal.bg};--card-border:${pal.border};--card-accent:${pal.accent}">
  <div class="card-body">
    <div class="card-left">
      <div class="trick-name">${e.title}</div>
      <div class="card-chips">
        <span class="chip status-chip" style="--s-bg:${st.bg};--s-fg:${st.fg}">${e.status}</span>
        ${diff ? `<span class="chip"><span class="material-icons-round">fitness_center</span>${diff}</span>` : ''}
        ${days != null ? `<span class="chip"><span class="material-icons-round">calendar_today</span>${days} days</span>` : ''}
      </div>
      <div class="milestones-row">${milHtml}</div>
    </div>

    <!-- Big Progress Ring -->
    <div class="progress-ring-wrap">
      <div class="progress-ring-outer">
        <svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
          <circle class="pr-track" cx="${sz/2}" cy="${sz/2}" r="${r}"/>
          <circle class="pr-fill" id="pr-arc-${sid(e.id)}"
            cx="${sz/2}" cy="${sz/2}" r="${r}"
            stroke="${prColor}"
            stroke-dasharray="${pDash.toFixed(2)} ${circ.toFixed(2)}"/>
        </svg>
        <div class="progress-ring-face">
          <span class="pr-pct" id="pr-pct-${sid(e.id)}">${pctDisp}%</span>
          <span class="pr-label">progress</span>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function mHTML(e, m) {
  const val  = e[m] || 0;
  const max  = MAX_VAL[m];
  const sz   = 58, sw = 4.5;
  const r    = (sz - sw*2) / 2;
  const circ = 2 * Math.PI * r;
  const dash = Math.min(val/max, 1) * circ;
  const k    = sid(`${e.id}-${m}`);
  const isL  = val > 0;
  const isBusy = busy.has(`${e.id}-${m}`);
  return `
<div class="milestone-item">
  <span class="milestone-label ${isL?'lit':''}">×${m}</span>
  <button class="ring-btn ${isL?'lit':''} ${isBusy?'busy':''}"
    id="rb-${k}" onclick="inc('${e.id}','${m}')" ${isBusy?'disabled':''}
    title="Tap to log ×${m}">
    <svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
      <circle class="r-track" cx="${sz/2}" cy="${sz/2}" r="${r}"/>
      <circle class="r-fill" id="arc-${k}" cx="${sz/2}" cy="${sz/2}" r="${r}"
        stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}"/>
    </svg>
    <div class="ring-face">
      <span class="ring-count" id="rv-${k}">${isBusy?'…':val}</span>
    </div>
  </button>
</div>`;
}

async function inc(pageId, m) {
  const key  = `${pageId}-${m}`;
  const k    = sid(key);
  if (busy.has(key)) return;

  const entry  = entries.find(e => e.id === pageId);
  if (!entry) return;
  const oldVal = entry[m] || 0;
  const newVal = oldVal + 1;
  const r    = (58 - 9) / 2;
  const circ = 2 * Math.PI * r;
  const nDash = Math.min(newVal / MAX_VAL[m], 1) * circ;

  entry[m] = newVal;
  busy.add(key);

  const rbEl  = document.getElementById(`rb-${k}`);
  const rvEl  = document.getElementById(`rv-${k}`);
  const arcEl = document.getElementById(`arc-${k}`);

  if (rvEl) rvEl.textContent = '…';
  if (rbEl) { rbEl.classList.add('busy'); rbEl.disabled = true; }

  try {
    await notionReq(`/pages/${pageId}`, 'PATCH',
      { properties: { [m]: { number: newVal } } });

    if (rvEl)  rvEl.textContent = newVal;
    if (arcEl) arcEl.setAttribute('stroke-dasharray', `${nDash.toFixed(2)} ${circ.toFixed(2)}`);
    if (rbEl) {
      rbEl.classList.remove('busy');
      rbEl.classList.add('lit', 'pulsed');
      rbEl.disabled = false;
      setTimeout(() => rbEl.classList.remove('pulsed'), 600);
    }

    toast(`${entry.title} · ×${m} → ${newVal}`, 'ok');

    refreshProgress(pageId);

  } catch(err) {
    entry[m] = oldVal;
    if (rvEl) rvEl.textContent = oldVal;
    if (rbEl) { rbEl.classList.remove('busy'); rbEl.disabled = false; }
    toast('Failed to save: ' + err.message, 'err');
  } finally {
    busy.delete(key);
  }
}

function refreshProgress(pageId) {
  const entry = entries.find(e => e.id === pageId);
  if (!entry) return;

  // Recompute from updated milestone values
  const pct    = calcProgress(entry);
  entry.progress = pct;

  const pctVal = Math.min(Math.max(pct, 0), 100);
  const sz = 100, sw = 9, r = (sz - sw*2) / 2;
  const circ  = 2 * Math.PI * r;
  const pDash = (pctVal / 100) * circ;

  const arcEl = document.getElementById(`pr-arc-${sid(pageId)}`);
  const pctEl = document.getElementById(`pr-pct-${sid(pageId)}`);
  if (arcEl) {
    arcEl.setAttribute('stroke-dasharray', `${pDash.toFixed(2)} ${circ.toFixed(2)}`);
  }
  if (pctEl) pctEl.textContent = `${pctVal}%`;
}

function toast(msg, type) {
  const c  = document.getElementById('snackbar-container');
  const el = document.createElement('div');
  el.className = `snackbar ${type}`;
  el.innerHTML = `<span class="material-icons-round">${type==='ok'?'check_circle':'error'}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(() => { el.classList.add('bye'); setTimeout(() => el.remove(), 240); }, 2800);
}

function sid(s) { return s.replace(/[^a-z0-9]/gi, ''); }
</script>
